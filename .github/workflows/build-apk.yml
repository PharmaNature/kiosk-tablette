name: Build APK

# Compile l'APK debug dans le cloud (aucune installation locale requise)
# et le publie dans la Release GitHub "latest" (onglet Releases du dépôt).

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write   # requis pour publier la release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Installer platform 36 + build-tools 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Build APK debug
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Renommer l'APK
        run: cp app/build/outputs/apk/debug/app-debug.apk kiosk-tablette.apk

      - name: Artefact (sauvegarde)
        uses: actions/upload-artifact@v4
        with:
          name: kiosk-tablette-debug-apk
          path: kiosk-tablette.apk
          if-no-files-found: error

      - name: Publier dans la Release "latest"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: APK kiosk (dernier build debug)
          body: |
            APK debug le plus récent, compilé automatiquement depuis `main`.
            Installation : voir le README (sideload ou `adb install kiosk-tablette.apk`).
          files: kiosk-tablette.apk
