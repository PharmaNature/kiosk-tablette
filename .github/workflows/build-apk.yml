name: Build APK

# Compile l'APK debug dans le cloud (aucune installation locale requise).
# Déclenchable à la main (onglet Actions → Build APK → Run workflow) ou à chaque push.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Installer platform 36 + build-tools 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Build APK debug
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Publier l'APK comme artefact
        uses: actions/upload-artifact@v4
        with:
          name: kiosk-tablette-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
